name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
          enable-cache: true
      - name: Install locked dependencies
        run: uv sync --locked --all-groups
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest
      - name: Build package
        run: uv build
